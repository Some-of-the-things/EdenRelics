services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: EdenRelics2026!
      POSTGRES_DB: edenrelics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=edenrelics;Username=postgres;Password=EdenRelics2026!
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY:-}
    ports:
      - "5260:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - PORT=4000
    ports:
      - "4000:4000"
    depends_on:
      - api

volumes:
  postgres_data:
