# Fly config for the seller tool API. NOT yet created/deployed — see DEPLOY.md for the provisioning
# steps (create the app + a Postgres, set the secrets). Suspends when idle (min_machines_running = 0)
# so it costs ~nothing until a beta points at it.
app = 'eden-relics-tool'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  ASPNETCORE_ENVIRONMENT = 'Production'
  ASPNETCORE_URLS = 'http://0.0.0.0:8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  interval = '30s'
  timeout = '5s'
  grace_period = '30s'
  method = 'GET'
  path = '/healthz'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
