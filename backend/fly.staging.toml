app = 'eden-relics-api-staging'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  ASPNETCORE_ENVIRONMENT = 'Staging'
  ASPNETCORE_URLS = 'http://0.0.0.0:8080'

# Mirrors prod's process-group split so the topology is validated here first:
# `web` serves HTTP with scheduled jobs OFF, a single `worker` runs them. Staging keeps
# min_machines_running = 1 to stay cheap — a deploy still creates one web + one worker.
# See backend/fly.toml for the full rationale.
[processes]
  web = '--BackgroundJobs:Enabled=false'
  worker = '--BackgroundJobs:Enabled=true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['web']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  interval = '30s'
  timeout = '5s'
  grace_period = '60s'
  method = 'GET'
  path = '/healthz'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
