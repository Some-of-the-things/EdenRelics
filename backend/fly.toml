# fly.toml app configuration file generated for eden-relics-api on 2026-03-11T18:31:40Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'eden-relics-api'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  ASPNETCORE_ENVIRONMENT = 'Production'
  ASPNETCORE_URLS = 'http://0.0.0.0:8080'

# Two roles from one image. `web` machines serve HTTP behind the load balancer with the
# scheduled background jobs OFF; `worker` is a single machine that runs the scheduled jobs
# (reminder emails, Monzo sync, SEO snapshots, traffic/rank ingest, liability schedule) and
# takes no load-balancer traffic. Running the jobs on exactly one machine is what makes it
# safe to scale `web` out — otherwise every instance would double-fire (duplicate emails etc).
# The command is appended to the Dockerfile ENTRYPOINT (dotnet "Eden Relics BE.dll") and
# ASP.NET reads --BackgroundJobs:Enabled into IConfiguration.
[processes]
  web = '--BackgroundJobs:Enabled=false'
  worker = '--BackgroundJobs:Enabled=true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 2
  processes = ['web']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  interval = '30s'
  timeout = '5s'
  grace_period = '60s'
  method = 'GET'
  path = '/healthz'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
