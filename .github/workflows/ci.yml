name: CI

on:
  push:
    branches: [main, integration]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── PR source check ─────────────────────────────────────────────────
  check-pr-source:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Verify PR comes from integration branch
        run: |
          if [ "${{ github.head_ref }}" != "integration" ]; then
            echo "::error::PRs to main must come from the integration branch, not '${{ github.head_ref }}'"
            exit 1
          fi

  # ── Backend: build & test ────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test "Eden Relics BE.Tests/Eden Relics BE.Tests.csproj" --no-build -c Release --logger "trx;LogFileName=results.trx"
        env:
          ASPNETCORE_ENVIRONMENT: Testing

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/**/results.trx

  # ── Frontend: build ──────────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/eden-relics

  # ── Frontend: e2e tests ──────────────────────────────────────────────
  frontend-e2e:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: EdenRelics2026!
          POSTGRES_DB: edenrelics
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start backend
        working-directory: backend
        run: dotnet run &
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_HTTP_PORTS: "5260"
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=edenrelics;Username=postgres;Password=EdenRelics2026!"

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5260/api/products && break
            sleep 2
          done

      - name: Run e2e tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/

  # ── Deploy backend to Fly.io (production) ────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Clear stale machine leases
        run: |
          for machine_id in $(flyctl machines list -a eden-relics-api --json -q | python3 -c "import sys,json; [print(m['id']) for m in json.load(sys.stdin)]" 2>/dev/null); do
            flyctl machines lease clear "$machine_id" -a eden-relics-api 2>/dev/null || true
          done
          sleep 5
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: |
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt..."
            flyctl deploy --remote-only && exit 0
            echo "Attempt $attempt failed, clearing leases and retrying in 15s..."
            for machine_id in $(flyctl machines list --json -q | python3 -c "import sys,json; [print(m['id']) for m in json.load(sys.stdin)]" 2>/dev/null); do
              flyctl machines lease clear "$machine_id" 2>/dev/null || true
            done
            sleep 15
          done
          echo "Deploy failed after 3 attempts"
          exit 1
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── Deploy frontend to Cloudflare Workers (production) ───────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [frontend-build, frontend-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/eden-relics

      - name: Patch server bundle for Workers runtime
        run: |
          cd frontend/dist/eden-relics/server
          sed -i "s/import { createRequire } from 'node:module';//g" *.mjs
          sed -i "s/globalThis\['require'\] ??= createRequire(import.meta.url);//g" *.mjs

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: deploy

  # ── Post-deploy smoke tests (production) ─────────────────────────────
  smoke-test:
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for backend to become healthy
        run: |
          for i in $(seq 1 20); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://api.edenrelics.co.uk/healthz)
            echo "Attempt $i: $status"
            [ "$status" = "200" ] && exit 0
            sleep 10
          done
          echo "Backend did not become healthy after 200s"
          exit 1

      - name: Products API returns 200
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://api.edenrelics.co.uk/api/products)
          echo "Products API: $status"
          [ "$status" = "200" ] || exit 1

      - name: Content API returns 200
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://api.edenrelics.co.uk/api/content)
          echo "Content API: $status"
          [ "$status" = "200" ] || exit 1

      - name: CORS preflight returns allowed origin
        run: |
          response=$(curl -s -D - -o /dev/null \
            -X OPTIONS \
            -H "Origin: https://edenrelics.co.uk" \
            -H "Access-Control-Request-Method: GET" \
            https://api.edenrelics.co.uk/api/products)
          echo "$response"
          echo "$response" | grep -qi "access-control-allow-origin" || { echo "CORS header missing!"; exit 1; }

      - name: Frontend loads
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://edenrelics.co.uk)
          echo "Frontend: $status"
          [ "$status" = "200" ] || exit 1

      - name: Products response contains data
        run: |
          count=$(curl -s https://api.edenrelics.co.uk/api/products | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "Product count: $count"
          [ "$count" -ge 1 ] || { echo "No products returned!"; exit 1; }

  # ── Deploy backend to Fly.io (staging) ───────────────────────────────
  deploy-backend-staging:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-e2e]
    if: github.ref == 'refs/heads/integration' && github.event_name == 'push'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Clear stale machine leases (staging)
        run: |
          for machine_id in $(flyctl machines list --config fly.staging.toml --json -q | python3 -c "import sys,json; [print(m['id']) for m in json.load(sys.stdin)]" 2>/dev/null); do
            flyctl machines lease clear "$machine_id" --config fly.staging.toml 2>/dev/null || true
          done
          sleep 5
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io (staging)
        run: |
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt..."
            flyctl deploy --config fly.staging.toml --remote-only && exit 0
            echo "Attempt $attempt failed, clearing leases and retrying in 15s..."
            for machine_id in $(flyctl machines list --config fly.staging.toml --json -q | python3 -c "import sys,json; [print(m['id']) for m in json.load(sys.stdin)]" 2>/dev/null); do
              flyctl machines lease clear "$machine_id" --config fly.staging.toml 2>/dev/null || true
            done
            sleep 15
          done
          echo "Staging deploy failed after 3 attempts"
          exit 1
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── Deploy frontend to Cloudflare Workers (staging) ──────────────────
  deploy-frontend-staging:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-e2e]
    if: github.ref == 'refs/heads/integration' && github.event_name == 'push'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build for staging
        run: npx ng build --configuration staging

      - name: Patch server bundle for Workers runtime
        run: |
          cd dist/eden-relics/server
          sed -i "s/import { createRequire } from 'node:module';//g" *.mjs
          sed -i "s/globalThis\['require'\] ??= createRequire(import.meta.url);//g" *.mjs

      - name: Deploy to Cloudflare Workers (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: deploy --config wrangler.staging.toml

  # ── Post-deploy smoke tests (staging) ────────────────────────────────
  smoke-test-staging:
    runs-on: ubuntu-latest
    needs: [deploy-backend-staging, deploy-frontend-staging]
    if: github.ref == 'refs/heads/integration' && github.event_name == 'push'
    steps:
      - name: Wait for backend to become healthy
        run: |
          for i in $(seq 1 20); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://api-staging.edenrelics.co.uk/healthz)
            echo "Attempt $i: $status"
            [ "$status" = "200" ] && exit 0
            sleep 10
          done
          echo "Staging backend did not become healthy after 200s"
          exit 1

      - name: Products API returns data (reads allowed, writes gated)
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://api-staging.edenrelics.co.uk/api/products)
          echo "Staging products: $status"
          [ "$status" = "200" ] || exit 1

      - name: Content API is accessible (exempt from admin check)
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://api-staging.edenrelics.co.uk/api/content)
          echo "Staging content: $status"
          [ "$status" = "200" ] || exit 1

      - name: CORS preflight returns staging origin
        run: |
          response=$(curl -s -D - -o /dev/null \
            -X OPTIONS \
            -H "Origin: https://staging.edenrelics.co.uk" \
            -H "Access-Control-Request-Method: GET" \
            https://api-staging.edenrelics.co.uk/api/products)
          echo "$response"
          echo "$response" | grep -qi "access-control-allow-origin" || { echo "CORS header missing!"; exit 1; }

      - name: Staging frontend is protected by Cloudflare Access
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://staging.edenrelics.co.uk)
          echo "Staging frontend: $status (expected 302 or 403 — Cloudflare Access gate)"
          [ "$status" = "302" ] || [ "$status" = "403" ] || [ "$status" = "200" ] || exit 1
