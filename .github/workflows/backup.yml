name: Daily Database Backup

on:
  schedule:
    # Run daily at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Install AWS CLI
        run: |
          curl -sSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install --update

      - name: Dump database
        run: |
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          echo "Dumping database at $TIMESTAMP..."
          pg_dump "$DATABASE_URL" --no-owner --no-privileges | gzip > "/tmp/edenrelics_${TIMESTAMP}.sql.gz"
          ls -lh /tmp/edenrelics_*.sql.gz
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload daily backup to R2
        run: |
          aws s3 cp "/tmp/edenrelics_${TIMESTAMP}.sql.gz" \
            "s3://${R2_BUCKET}/daily/edenrelics_${TIMESTAMP}.sql.gz" \
            --endpoint-url "$R2_ENDPOINT" --quiet
          echo "Daily backup uploaded."
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_BACKUP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_BACKUP_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}

      - name: Upload weekly backup (Sundays)
        if: contains('0', github.event.schedule) || github.event_name == 'workflow_dispatch'
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" = "7" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            aws s3 cp "/tmp/edenrelics_${TIMESTAMP}.sql.gz" \
              "s3://${R2_BUCKET}/weekly/edenrelics_${TIMESTAMP}.sql.gz" \
              --endpoint-url "$R2_ENDPOINT" --quiet
            echo "Weekly backup uploaded."
          else
            echo "Not Sunday ($DOW), skipping weekly backup."
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_BACKUP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_BACKUP_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}

      - name: Prune old daily backups (keep 7)
        run: |
          echo "Pruning daily backups..."
          aws s3 ls "s3://${R2_BUCKET}/daily/" --endpoint-url "$R2_ENDPOINT" \
            | sort -r | tail -n +8 | while read -r line; do
              filename=$(echo "$line" | awk '{print $4}')
              if [ -n "$filename" ]; then
                echo "  Deleting: $filename"
                aws s3 rm "s3://${R2_BUCKET}/daily/${filename}" --endpoint-url "$R2_ENDPOINT" --quiet
              fi
            done
          echo "Done."
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_BACKUP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_BACKUP_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}

      - name: Prune old weekly backups (keep 4)
        run: |
          echo "Pruning weekly backups..."
          aws s3 ls "s3://${R2_BUCKET}/weekly/" --endpoint-url "$R2_ENDPOINT" \
            | sort -r | tail -n +5 | while read -r line; do
              filename=$(echo "$line" | awk '{print $4}')
              if [ -n "$filename" ]; then
                echo "  Deleting: $filename"
                aws s3 rm "s3://${R2_BUCKET}/weekly/${filename}" --endpoint-url "$R2_ENDPOINT" --quiet
              fi
            done
          echo "Done."
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_BACKUP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_BACKUP_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}

      - name: Verify backup exists
        run: |
          echo "Verifying backup..."
          aws s3 ls "s3://${R2_BUCKET}/daily/edenrelics_${TIMESTAMP}.sql.gz" \
            --endpoint-url "$R2_ENDPOINT"
          echo "Backup verified."
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_BACKUP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_BACKUP_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
