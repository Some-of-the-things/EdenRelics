name: Daily Database Backup

on:
  schedule:
    # Run daily at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_BACKUP_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_BACKUP_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Dump database
        run: |
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          echo "Dumping database at $TIMESTAMP..."
          pg_dump "$DATABASE_URL" --no-owner --no-privileges | gzip > "/tmp/edenrelics_${TIMESTAMP}.sql.gz"
          ls -lh /tmp/edenrelics_*.sql.gz
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload daily backup to R2
        run: |
          aws s3 cp "/tmp/edenrelics_${TIMESTAMP}.sql.gz" "s3://${R2_BUCKET}/daily/edenrelics_${TIMESTAMP}.sql.gz" --endpoint-url "$R2_ENDPOINT"
          echo "Daily backup uploaded."

      - name: Upload weekly backup (Sundays)
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" = "7" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            aws s3 cp "/tmp/edenrelics_${TIMESTAMP}.sql.gz" "s3://${R2_BUCKET}/weekly/edenrelics_${TIMESTAMP}.sql.gz" --endpoint-url "$R2_ENDPOINT"
            echo "Weekly backup uploaded."
          else
            echo "Not Sunday (day $DOW), skipping weekly backup."
          fi

      - name: Prune old daily backups (keep 7)
        run: |
          aws s3 ls "s3://${R2_BUCKET}/daily/" --endpoint-url "$R2_ENDPOINT" | sort -r | tail -n +8 | while read -r line; do
            filename=$(echo "$line" | awk '{print $4}')
            if [ -n "$filename" ]; then
              echo "Deleting: $filename"
              aws s3 rm "s3://${R2_BUCKET}/daily/${filename}" --endpoint-url "$R2_ENDPOINT"
            fi
          done

      - name: Prune old weekly backups (keep 4)
        run: |
          aws s3 ls "s3://${R2_BUCKET}/weekly/" --endpoint-url "$R2_ENDPOINT" | sort -r | tail -n +5 | while read -r line; do
            filename=$(echo "$line" | awk '{print $4}')
            if [ -n "$filename" ]; then
              echo "Deleting: $filename"
              aws s3 rm "s3://${R2_BUCKET}/weekly/${filename}" --endpoint-url "$R2_ENDPOINT"
            fi
          done

      - name: Verify backup exists
        run: |
          aws s3 ls "s3://${R2_BUCKET}/daily/edenrelics_${TIMESTAMP}.sql.gz" --endpoint-url "$R2_ENDPOINT"
          echo "Backup verified."
