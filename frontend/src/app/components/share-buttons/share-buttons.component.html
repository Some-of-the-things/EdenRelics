<div class="share" role="group" aria-label="Share this">
  <span class="share__label">Share</span>
  <a
    [href]="pinterestUrl()"
    target="_blank"
    rel="noopener noreferrer nofollow"
    class="share__btn"
    aria-label="Share on Pinterest"
    title="Pinterest"
  >
    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
      <path d="M12 0a12 12 0 0 0-4.4 23.16c-.06-.93-.12-2.35.03-3.36.13-.93.84-5.95.84-5.95s-.21-.42-.21-1.05c0-.99.57-1.73 1.29-1.73.6 0 .9.45.9 1 0 .61-.39 1.52-.59 2.37-.17.71.36 1.29 1.07 1.29 1.29 0 2.27-1.36 2.27-3.31 0-1.73-1.25-2.94-3.03-2.94-2.07 0-3.28 1.55-3.28 3.15 0 .62.24 1.29.54 1.65a.22.22 0 0 1 .05.21l-.21.85c-.03.14-.11.17-.25.1-.93-.43-1.51-1.78-1.51-2.86 0-2.33 1.69-4.47 4.88-4.47 2.56 0 4.55 1.83 4.55 4.27 0 2.54-1.6 4.59-3.83 4.59-.75 0-1.45-.39-1.69-.85 0 0-.37 1.42-.46 1.77-.17.65-.62 1.46-.92 1.95A12 12 0 1 0 12 0z" fill="currentColor"/>
    </svg>
  </a>
  <a
    [href]="whatsappUrl()"
    target="_blank"
    rel="noopener noreferrer nofollow"
    class="share__btn"
    aria-label="Share on WhatsApp"
    title="WhatsApp"
  >
    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
      <path d="M17.5 14.4c-.3-.2-1.8-.9-2.1-1-.3-.1-.5-.2-.7.2-.2.3-.8 1-.9 1.2-.2.2-.4.2-.7.1-.3-.2-1.3-.5-2.4-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.5.1-.6.1-.1.3-.4.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5 0-.1-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4 0 1.4 1 2.8 1.2 3 .2.2 2 3.1 4.9 4.3 1.7.7 2.4.8 3.3.6.5-.1 1.6-.7 1.8-1.3.2-.6.2-1.2.2-1.3-.1-.1-.3-.2-.6-.4zM12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.5 1.3 5L2 22l5.2-1.3c1.4.8 3.1 1.3 4.8 1.3 5.5 0 10-4.5 10-10S17.5 2 12 2z" fill="currentColor"/>
    </svg>
  </a>
  <a
    [href]="facebookUrl()"
    target="_blank"
    rel="noopener noreferrer nofollow"
    class="share__btn"
    aria-label="Share on Facebook"
    title="Facebook"
  >
    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
      <path d="M22.7 0H1.3C.6 0 0 .6 0 1.3v21.4c0 .7.6 1.3 1.3 1.3h11.5v-9.3H9.7v-3.6h3.1V8.4c0-3.1 1.9-4.8 4.7-4.8 1.3 0 2.5.1 2.8.1V7h-1.9c-1.5 0-1.8.7-1.8 1.8v2.4h3.6l-.5 3.6h-3.1V24h6.1c.7 0 1.3-.6 1.3-1.3V1.3C24 .6 23.4 0 22.7 0z" fill="currentColor"/>
    </svg>
  </a>
  <a
    [href]="emailUrl()"
    class="share__btn"
    aria-label="Share via email"
    title="Email"
  >
    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
      <path d="M22 4H2c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h20c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-10 6L2 8V6l10 6 10-6v2z" fill="currentColor"/>
    </svg>
  </a>
  <button
    type="button"
    class="share__btn"
    [class.share__btn--copied]="copied()"
    (click)="copyLink()"
    [attr.aria-label]="copied() ? 'Link copied to clipboard' : 'Copy link'"
    [title]="copied() ? 'Copied!' : 'Copy link'"
  >
    @if (copied()) {
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="currentColor"/>
      </svg>
    } @else {
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
        <path d="M10.6 13.4a3 3 0 0 1 0-4.2l4-4a3 3 0 0 1 4.2 4.2l-1.4 1.4M13.4 10.6a3 3 0 0 1 0 4.2l-4 4a3 3 0 0 1-4.2-4.2l1.4-1.4" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
    }
  </button>
  @if (canNativeShare()) {
    <button
      type="button"
      class="share__btn"
      (click)="nativeShare()"
      aria-label="More share options"
      title="More"
    >
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
        <path d="M12 2L8 6h3v8h2V6h3l-4-4zM5 18v2h14v-2H5z" fill="currentColor"/>
      </svg>
    </button>
  }
  <span class="sr-only" role="status" aria-live="polite">
    @if (copied()) { Link copied to clipboard }
  </span>
</div>
