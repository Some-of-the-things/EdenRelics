@if (visible()) {
  <div class="cookie-banner" role="dialog" aria-label="Cookie consent">
    <div class="cookie-banner__content">
      <p class="cookie-banner__text">
        We use essential cookies to make this site work. We'd also like to use non-essential cookies to help us improve your experience.
        Read our <a routerLink="/cookie-policy" class="cookie-banner__link">Cookie Policy</a> for more information.
      </p>
      <div class="cookie-banner__actions">
        <button class="cookie-banner__btn cookie-banner__btn--accept" (click)="acceptAll()">Accept All</button>
        <button class="cookie-banner__btn cookie-banner__btn--essential" (click)="acceptEssential()">Essential Only</button>
      </div>
    </div>
  </div>
}
