<div class="reset">
  <form class="reset__card" (ngSubmit)="submit()">
    @if (!done()) {
      <h1 class="reset__title">Reset Password</h1>
      <p class="reset__subtitle">Enter your new password below.</p>
      <label class="reset__field">
        <span>Email</span>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
          required
        />
      </label>
      <label class="reset__field">
        <span>Reset Token</span>
        <input
          type="text"
          [(ngModel)]="tokenValue"
          name="token"
          required
        />
      </label>
      <label class="reset__field">
        <span>New Password</span>
        <input
          type="password"
          [(ngModel)]="newPassword"
          name="newPassword"
          autocomplete="new-password"
          required
        />
      </label>
      <label class="reset__field">
        <span>Confirm Password</span>
        <input
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          autocomplete="new-password"
          required
        />
      </label>
      @if (error()) {
        <p class="reset__error" role="alert">{{ error() }}</p>
      }
      <button type="submit" class="reset__btn" [disabled]="processing()">
        {{ processing() ? 'Resetting...' : 'Reset Password' }}
      </button>
    } @else {
      <h1 class="reset__title">Password Reset</h1>
      <p class="reset__subtitle">Your password has been successfully reset.</p>
      <a routerLink="/login" class="reset__btn reset__btn--link">Sign In</a>
    }
  </form>
</div>
