<div class="shop">
  <header class="shop__header">
    <h1 class="shop__title">{{ view().heading }}</h1>
    <p class="shop__lede">{{ view().lede }}</p>
    @if (view().relatedLink; as link) {
      <p class="shop__lede shop__lede--cta">{{ link.lead }}<a [routerLink]="link.routerLink">{{ link.text }}</a>{{ link.after ?? '.' }}</p>
    }
  </header>

  <app-product-list />
</div>
