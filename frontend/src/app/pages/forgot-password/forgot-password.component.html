<div class="forgot">
  <form class="forgot__card" (ngSubmit)="submit()">
    @if (!sent()) {
      <h1 class="forgot__title">Forgot Password</h1>
      <p class="forgot__subtitle">Enter your email and we'll send you a reset link.</p>
      <label class="forgot__field">
        <span>Email</span>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
          required
        />
      </label>
      @if (error()) {
        <p class="forgot__error" role="alert">{{ error() }}</p>
      }
      <button type="submit" class="forgot__btn" [disabled]="processing()">
        {{ processing() ? 'Sending...' : 'Send Reset Link' }}
      </button>
    } @else {
      <h1 class="forgot__title">Check Your Email</h1>
      <p class="forgot__subtitle">
        If an account exists for {{ email }}, you'll receive a password reset link shortly.
      </p>
    }
    <p class="forgot__link">
      <a routerLink="/login">Back to Sign In</a>
    </p>
  </form>
</div>
