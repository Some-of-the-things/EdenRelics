<article class="about">
  <h1 class="about__title">{{ content.get('page.about.title', 'Lovingly handpicked vintage') }}</h1>

  <div class="about__prose" [innerHTML]="content.get('page.about.content', defaultContent)"></div>

  <section class="about__founders">
    <h2 class="about__founders-title">{{ content.get('page.about.founders.title', defaultFoundersTitle) }}</h2>
    <div class="about__prose" [innerHTML]="content.get('page.about.founders.content', defaultFoundersContent)"></div>
  </section>

  <p class="about__signature">{{ content.get('page.about.signature', 'Teodora Carter & Peter Carter') }}</p>

  <img src="logo-original.png" alt="Eden Relics" class="about__logo" width="160" height="206" loading="lazy" />
</article>
